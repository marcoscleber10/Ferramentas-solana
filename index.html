<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Solana Ecosystem Directory | Mapping the Financial Layer</title>
    <meta name="description" content="Diretório profissional de projetos Solana: DeFi, RWA, DePIN, infraestrutura e mais. Busca, filtros e métricas em tempo real.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        :root {
            --solana-primary: #14F195;
            --solana-gradient-start: #14F195;
            --solana-gradient-end: #9945FF;
            --dark: #0F1419;
            --bg: #FAF8F5;
            --card-bg: #FFFFFF;
            --border-light: #F0E4D4;
            --text-primary: #1A2C2E;
            --text-secondary: #5B6E6E;
            --badge-defi: #E0F2FE;
            --badge-rwa: #E8F0E8;
            --badge-depin: #FEF3C7;
            --badge-infra: #E6F4EA;
            --badge-oracle: #F3E5F5;
            --badge-solana: #E0FFE6;
            --shadow-sm: 0 8px 20px rgba(0,0,0,0.03), 0 0 0 1px rgba(20,241,149,0.1);
            --shadow-md: 0 12px 28px rgba(0,0,0,0.05), 0 0 0 1px rgba(20,241,149,0.2);
            --filter-bg: #f0e9e2;
            --search-bg: #f5f2ef;
        }

        body.dark {
            --bg: #0F1419;
            --card-bg: #1A2629;
            --border-light: #2C3E3B;
            --text-primary: #EDF2F0;
            --text-secondary: #A0B3B0;
            --badge-defi: #1A2C3A;
            --badge-rwa: #2A3A2A;
            --badge-depin: #3A2A1A;
            --badge-infra: #1E3A2A;
            --badge-oracle: #2A2A3A;
            --badge-solana: #1E3A2A;
            --shadow-sm: 0 8px 20px rgba(0,0,0,0.2), 0 0 0 1px rgba(20,241,149,0.2);
            --shadow-md: 0 12px 28px rgba(0,0,0,0.25), 0 0 0 1px rgba(20,241,149,0.25);
            --filter-bg: #2A3538;
            --search-bg: #1F2A2C;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            transition: background 0.2s, color 0.2s;
        }

        .container {
            max-width: 1440px;
            margin: 0 auto;
            padding: 1.5rem 1.5rem 2.5rem;
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .dark-toggle {
            background: var(--card-bg);
            border: 1px solid var(--border-light);
            border-radius: 40px;
            padding: 0.4rem 1rem;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            color: var(--text-primary);
        }

        .dark-toggle:hover {
            border-color: var(--solana-primary);
            background: var(--solana-primary);
            color: var(--dark);
        }

        .hero {
            text-align: center;
            margin-bottom: 2rem;
            padding: 2rem 0 1rem;
            background: linear-gradient(135deg, rgba(20,241,149,0.05), rgba(153,69,255,0.05));
            border-radius: 48px;
            margin-top: 1rem;
        }

        .hero h1 {
            font-size: 2.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--solana-primary), var(--solana-gradient-end));
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
        }

        .hero .sub {
            font-size: 1.1rem;
            color: var(--text-secondary);
            max-width: 600px;
            margin: 0 auto;
        }

        .stats-bar {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 2rem;
            margin: 1.5rem 0 0;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 0.5rem 1.2rem;
            border-radius: 60px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-light);
        }

        .stat-card span {
            font-weight: 700;
            color: var(--solana-primary);
            font-size: 1.2rem;
            margin-right: 0.3rem;
        }

        .controls {
            background: var(--card-bg);
            border-radius: 60px;
            padding: 0.5rem 1rem;
            margin-bottom: 2rem;
            box-shadow: var(--shadow-sm);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }

        .search-box {
            flex: 2;
            min-width: 200px;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--search-bg);
            border-radius: 40px;
            padding: 0.4rem 1rem;
        }

        .search-box input {
            width: 100%;
            background: transparent;
            border: none;
            font-size: 0.9rem;
            padding: 0.5rem 0;
            outline: none;
            font-family: inherit;
            color: var(--text-primary);
        }

        .filter-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            align-items: center;
        }

        .filter-chip {
            background: var(--filter-bg);
            border: none;
            padding: 0.4rem 1rem;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            color: var(--text-secondary);
        }

        .filter-chip.active {
            background: var(--solana-primary);
            color: var(--dark);
        }

        .categories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 1.8rem;
        }

        .card {
            background: var(--card-bg);
            border-radius: 32px;
            box-shadow: var(--shadow-sm);
            transition: all 0.25s ease;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-md);
        }

        .card-header {
            padding: 1.2rem 1.5rem 0.6rem;
            border-bottom: 1px solid var(--border-light);
            background: var(--card-bg);
        }

        .card-header h2 {
            font-size: 1.5rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            letter-spacing: -0.3px;
        }

        .card-header h2 span {
            background: var(--solana-primary);
            color: var(--dark);
            font-size: 0.75rem;
            font-weight: 600;
            padding: 0.15rem 0.6rem;
            border-radius: 30px;
        }

        .tools-list {
            padding: 1.2rem 1.5rem 1.5rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            align-items: center;
        }

        .tool-chip {
            background: var(--card-bg);
            border: 1px solid var(--border-light);
            padding: 0.45rem 1rem;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            text-decoration: none;
            color: var(--text-primary);
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .tool-chip:hover {
            background: #FEF7E8;
            border-color: var(--solana-primary);
            color: var(--solana-primary);
        }

        body.dark .tool-chip:hover {
            background: #2C3E3B;
            color: var(--solana-primary);
        }

        .badges {
            display: inline-flex;
            gap: 4px;
            margin-left: 4px;
        }

        .badge {
            font-size: 0.6rem;
            font-weight: 600;
            padding: 0.2rem 0.5rem;
            border-radius: 20px;
            background: #f0f0f0;
            color: #3a4a4a;
            white-space: nowrap;
        }

        .badge.defi { background: var(--badge-defi); color: #0e6b6b; }
        .badge.rwa { background: var(--badge-rwa); color: #3a6b2a; }
        .badge.depin { background: var(--badge-depin); color: #b97f10; }
        .badge.infra { background: var(--badge-infra); color: #2c6e3c; }
        .badge.oracle { background: var(--badge-oracle); color: #6b2e6b; }
        .badge.solana { background: var(--badge-solana); color: #00A86B; }

        body.dark .badge {
            background: #2C3E3B;
            color: #e0c8a0;
        }
        body.dark .badge.defi { background: #1A2C3A; color: #81d4fa; }
        body.dark .badge.rwa { background: #2A3A2A; color: #8bc34a; }
        body.dark .badge.depin { background: #3A2A1A; color: #ffaa66; }
        body.dark .badge.infra { background: #1E3A2A; color: #8bc34a; }
        body.dark .badge.oracle { background: #2A2A3A; color: #b39ddb; }
        body.dark .badge.solana { background: #1E3A2A; color: #00ffa3; }

        .no-results {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
            font-size: 1.1rem;
            grid-column: 1 / -1;
        }

        footer {
            margin-top: 3rem;
            text-align: center;
            border-top: 1px solid var(--border-light);
            padding-top: 1.8rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        @media (max-width: 720px) {
            .container { padding: 1rem; }
            .hero h1 { font-size: 2rem; }
            .controls { border-radius: 28px; flex-direction: column; align-items: stretch; }
            .stats-bar { gap: 1rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header-row">
        <div class="lang-switcher" style="display: flex; gap: 0.5rem;">
            <!-- placeholder para futura internacionalização -->
        </div>
        <button id="darkModeToggle" class="dark-toggle">🌙 Modo Escuro</button>
    </div>

    <div class="hero">
        <h1>SOLANA ECOSYSTEM DIRECTORY</h1>
        <div class="sub">Mapping the financial infrastructure built on Solana.</div>
        <div class="stats-bar" id="statsBar">
            <div class="stat-card"><span id="totalProjects">0</span> Total Projects</div>
            <div class="stat-card"><span id="totalCategories">0</span> Categories</div>
            <div class="stat-card"><span id="defiCount">0</span> DeFi Protocols</div>
            <div class="stat-card"><span id="rwaCount">0</span> RWA Projects</div>
        </div>
    </div>

    <div class="controls">
        <div class="search-box">
            <span>🔍</span>
            <input type="text" id="searchInput" placeholder="Buscar projeto por nome...">
        </div>
        <div class="filter-tags" id="filterTagsContainer">
            <!-- filtros dinâmicos -->
        </div>
    </div>

    <div class="categories-grid" id="toolsGrid"></div>

    <footer>
        <div class="attribution">📡 Diretório independente do ecossistema Solana — dados em constante evolução.</div>
    </footer>
</div>

<script>
    // ==================== SOLANA PROJECTS DATA ====================
    const solanaProjects = [
        // Stablecoins
        { name: "USDC", category: "Stablecoins", url: "https://circle.com/usdc", tags: ["stablecoin", "defi"] },
        { name: "USDT", category: "Stablecoins", url: "https://tether.to", tags: ["stablecoin", "defi"] },
        // Lending
        { name: "Kamino", category: "Lending", url: "https://kamino.finance", tags: ["defi", "lending"] },
        { name: "Marginfi", category: "Lending", url: "https://marginfi.com", tags: ["defi", "lending"] },
        { name: "Solend", category: "Lending", url: "https://solend.fi", tags: ["defi", "lending"] },
        // DEX
        { name: "Jupiter", category: "DEX", url: "https://jup.ag", tags: ["dex", "defi", "popular"] },
        { name: "Raydium", category: "DEX", url: "https://raydium.io", tags: ["dex", "defi"] },
        { name: "Orca", category: "DEX", url: "https://orca.so", tags: ["dex", "defi"] },
        // Asset Management
        { name: "Squads", category: "Asset Management", url: "https://squads.so", tags: ["infra", "multisig"] },
        { name: "Meteora", category: "Asset Management", url: "https://meteora.ag", tags: ["defi", "liquidity"] },
        // Liquid Staking
        { name: "Jito", category: "Liquid Staking", url: "https://jito.network", tags: ["defi", "lst"] },
        { name: "Sanctum", category: "Liquid Staking", url: "https://sanctum.so", tags: ["defi", "lst"] },
        { name: "Marinade", category: "Liquid Staking", url: "https://marinade.finance", tags: ["defi", "lst", "popular"] },
        // RWA
        { name: "Ondo Finance", category: "RWA", url: "https://ondo.finance", tags: ["rwa", "defi"] },
        { name: "Maple Finance", category: "RWA", url: "https://maple.finance", tags: ["rwa", "credit"] },
        // DePIN
        { name: "Helium", category: "DePIN", url: "https://helium.com", tags: ["depin", "iot"] },
        { name: "Hivemapper", category: "DePIN", url: "https://hivemapper.com", tags: ["depin", "data"] },
        // Identity
        { name: "SNS", category: "Identity", url: "https://sns.id", tags: ["identity"] },
        { name: "AllDomains", category: "Identity", url: "https://alldomains.id", tags: ["identity"] },
        // Oracles
        { name: "Pyth", category: "Oracles", url: "https://pyth.network", tags: ["oracle", "infra"] },
        { name: "Switchboard", category: "Oracles", url: "https://switchboard.xyz", tags: ["oracle"] },
        // Data & Analytics
        { name: "Grass", category: "Data & Analytics", url: "https://grass.io", tags: ["depin", "data"] }
    ];

    // Agrupar por categoria (e ordenar categorias por nome ou por quantidade)
    const categoriesMap = new Map();
    for (const proj of solanaProjects) {
        if (!categoriesMap.has(proj.category)) categoriesMap.set(proj.category, []);
        categoriesMap.get(proj.category).push(proj);
    }
    // Converter para array e ordenar por quantidade (decrescente)
    let categories = Array.from(categoriesMap.entries()).map(([name, items]) => ({ name, items }));
    categories.sort((a, b) => b.items.length - a.items.length);

    // ==================== RENDERIZAÇÃO ====================
    let activeFilter = "all";
    let searchTerm = "";

    function renderProjects() {
        const grid = document.getElementById("toolsGrid");
        if (!grid) return;

        let filteredCategories = categories.map(cat => {
            const filteredItems = cat.items.filter(item => {
                const matchSearch = searchTerm === "" || item.name.toLowerCase().includes(searchTerm.toLowerCase());
                const matchFilter = activeFilter === "all" || (item.tags && item.tags.includes(activeFilter));
                return matchSearch && matchFilter;
            });
            return { ...cat, items: filteredItems };
        }).filter(cat => cat.items.length > 0);

        if (filteredCategories.length === 0) {
            grid.innerHTML = `<div class="no-results">Nenhum projeto encontrado 😢</div>`;
            return;
        }

        let html = "";
        for (const cat of filteredCategories) {
            html += `<div class="card">
                        <div class="card-header">
                            <h2>${cat.name} <span>${cat.items.length}</span></h2>
                        </div>
                        <div class="tools-list">`;
            for (const item of cat.items) {
                const url = item.url;
                const isPlaceholder = !url;
                const linkAttrs = isPlaceholder ? 'href="javascript:void(0)" class="tool-chip placeholder-link"' : `href="${url}" target="_blank" rel="noopener noreferrer" class="tool-chip"`;
                let badgesHtml = "";
                if (item.tags) {
                    if (item.tags.includes("popular")) badgesHtml += `<span class="badge">⭐ Popular</span>`;
                    if (item.tags.includes("defi")) badgesHtml += `<span class="badge defi">📈 DeFi</span>`;
                    if (item.tags.includes("rwa")) badgesHtml += `<span class="badge rwa">🏭 RWA</span>`;
                    if (item.tags.includes("depin")) badgesHtml += `<span class="badge depin">📡 DePIN</span>`;
                    if (item.tags.includes("infra")) badgesHtml += `<span class="badge infra">🖧 Infra</span>`;
                    if (item.tags.includes("oracle")) badgesHtml += `<span class="badge oracle">🔮 Oracle</span>`;
                    if (item.tags.includes("lst")) badgesHtml += `<span class="badge">🥩 LST</span>`;
                    if (item.tags.includes("dex")) badgesHtml += `<span class="badge">🔄 DEX</span>`;
                    if (item.tags.includes("lending")) badgesHtml += `<span class="badge">💰 Lending</span>`;
                }
                badgesHtml += `<span class="badge solana">🟢 Solana</span>`;
                html += `<a ${linkAttrs}><span>✨</span> ${item.name}<div class="badges">${badgesHtml}</div></a>`;
            }
            html += `</div></div>`;
        }
        grid.innerHTML = html;
        document.querySelectorAll('.placeholder-link').forEach(el => {
            el.setAttribute('title', 'Link oficial não disponível no momento');
        });
    }

    function updateMetrics() {
        // Total de projetos (únicos)
        const totalProjects = solanaProjects.length;
        // Total de categorias (distintas)
        const uniqueCategories = new Set(solanaProjects.map(p => p.category)).size;
        // Contagem de DeFi (projetos com tag "defi")
        const defiCount = solanaProjects.filter(p => p.tags.includes("defi")).length;
        // Contagem de RWA (projetos com tag "rwa")
        const rwaCount = solanaProjects.filter(p => p.tags.includes("rwa")).length;
        document.getElementById("totalProjects").innerText = totalProjects;
        document.getElementById("totalCategories").innerText = uniqueCategories;
        document.getElementById("defiCount").innerText = defiCount;
        document.getElementById("rwaCount").innerText = rwaCount;
    }

    function updateFilters() {
        // Criar filtros com base nas tags únicas (exceto "all")
        const allTags = new Set();
        solanaProjects.forEach(p => {
            p.tags.forEach(tag => allTags.add(tag));
        });
        // Filtros principais: DeFi, RWA, DePIN, Oracle, Infra, etc.
        const filterList = [
            { label: "Todos", value: "all", active: true },
            { label: "📈 DeFi", value: "defi" },
            { label: "🏭 RWA", value: "rwa" },
            { label: "📡 DePIN", value: "depin" },
            { label: "🔮 Oracle", value: "oracle" },
            { label: "🖧 Infra", value: "infra" }
        ];
        const container = document.getElementById("filterTagsContainer");
        container.innerHTML = filterList.map(f => `<button class="filter-chip ${activeFilter === f.value ? 'active' : ''}" data-filter="${f.value}">${f.label}</button>`).join('');
        container.querySelectorAll('.filter-chip').forEach(btn => {
            btn.addEventListener('click', (e) => {
                activeFilter = btn.getAttribute('data-filter');
                updateFilters(); // re-renderiza botões com estado ativo
                renderProjects();
            });
        });
    }

    // ==================== DARK MODE (consistente com o index) ====================
    function initDarkMode() {
        const stored = localStorage.getItem("solanaToolsDark");
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const isDark = stored === "true" || (stored === null && prefersDark);
        if (isDark) document.body.classList.add('dark');
        const toggle = document.getElementById("darkModeToggle");
        toggle.addEventListener('click', () => {
            document.body.classList.toggle('dark');
            localStorage.setItem("solanaToolsDark", document.body.classList.contains('dark'));
        });
    }

    // ==================== EVENTOS ====================
    function init() {
        initDarkMode();
        updateMetrics();
        updateFilters();
        renderProjects();

        const searchInput = document.getElementById("searchInput");
        searchInput.addEventListener("input", (e) => {
            searchTerm = e.target.value;
            renderProjects();
        });
    }

    init();
</script>
</body>
</html>
